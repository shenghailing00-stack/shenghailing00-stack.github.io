<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RuyiSDK Internship Record | SHENG HAILING</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: rgba(255, 255, 255, 0.78);
      --text: #171717;
      --muted: #66615a;
      --line: #ddd6cc;
      --accent: #2f5d62;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Noto Serif", "Songti SC", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      text-decoration: none;
    }

    .back:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hero {
      margin-bottom: 34px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 1.08rem;
      font-weight: 700;
    }

    .card ul {
      margin: 0;
      padding-left: 18px;
    }

    .card li {
      margin: 8px 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 36px 16px 56px;
      }

      .card {
        padding: 18px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="./index.html">← Back to Home</a>

    <section class="hero">
      <h1>RuyiSDK Internship Record</h1>
      <p>
        A record of my internship-related notes, reports, and community outputs during the RuyiSDK internship.
      </p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Weekly / Monthly Reports</h2>
        <ul>
          <li><a href="https://github.com/shenghailing00-stack/ruyisdk-weekly" target="_blank" rel="noreferrer">RuyiSDK Weekly Reports</a></li>
        </ul>
      </div>

      <div class="card">
        <h2>Technical Notes</h2>
        <ul>
          <li><a href="https://github.com/shenghailing00-stack/ruyisdk-intern/tree/main/notes" target="_blank" rel="noreferrer">RuyiSDK Notes</a></li>
        </ul>
      </div>

      <div class="card">
        <h2>Forum Posts</h2>
        <ul>
          <li><a href="https://ruyisdk.cn/t/topic/2653" target="_blank" rel="noreferrer">RuyiSDK 安装与初次使用笔记</a></li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
